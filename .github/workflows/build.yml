name: Build Windows Installer

# 打包 Windows 安装档（.exe）
# 触发：① 推 tag v* → 自动建 Release 并附上安装档  ② 手动 workflow_dispatch（产出 artifact 供下载）
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 建 Release 需要

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 打包（electron-builder · Windows）
        run: npm run build

      - name: 上传安装档 artifact（手动跑时下载用）
        uses: actions/upload-artifact@v4
        with:
          name: artdico-widget-win
          path: dist/*.exe
          if-no-files-found: error

      - name: 发布 Release（仅打 tag 时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
